name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========================
  # Python Backend Tests
  # ========================
  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx python-dotenv bcrypt asyncpg jose openai

      - name: Run pytest
        run: |
          cd ${{ github.workspace }}
          python -m pytest tests/ -v --tb=short

  # ========================
  # Python Lint
  # ========================
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy

      - name: Run ruff check
        run: |
          cd ${{ github.workspace }}
          ruff check .

      - name: Run black check
        run: |
          cd ${{ github.workspace }}
          black --check .

      - name: Run mypy
        run: |
          cd ${{ github.workspace }}
          mypy backend/ agents/ --ignore-missing-imports --no-error-summary || true

  # ========================
  # Frontend Build
  # ========================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd ${{ github.workspace }}/frontend
          npm ci

      - name: Run ESLint
        run: |
          cd ${{ github.workspace }}/frontend
          npm run lint || true

      - name: Build frontend
        run: |
          cd ${{ github.workspace }}/frontend
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  # ========================
  # Dependency Security Check
  # ========================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run safety check (Python)
        run: |
          python -m pip install safety || true
          safety check || true
        continue-on-error: true

      - name: Run npm audit (Frontend)
        run: |
          cd ${{ github.workspace }}/frontend
          npm audit --audit-level=moderate || true
        continue-on-error: true