name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========================
  # Python Backend Tests
  # ========================
  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx python-dotenv bcrypt asyncpg "python-jose[cryptography]" openai fastapi uvicorn

      - name: Run pytest
        run: |
          cd ${{ github.workspace }}
          python -m pytest tests/ -v --tb=short

  # ========================
  # Python Lint (Critical Issues Only)
  # ========================
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check (critical errors only)
        run: |
          cd ${{ github.workspace }}
          # Only check for critical syntax errors, ignore style/fmt issues
          ruff check backend/ tests/ --select=E9,F63,F7,F82 || true
          ruff check . --select=F821,F822,F823 || true

  # ========================
  # Frontend Build
  # ========================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd ${{ github.workspace }}/frontend
          npm ci

      - name: Build frontend
        run: |
          cd ${{ github.workspace }}/frontend
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1